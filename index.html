<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hab Pembelajaran SKPK Miri</title>
    
    <!-- Memuatkan Tailwind CSS untuk gaya -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Memuatkan Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        /* Animasi Latar Belakang */
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob {
            animation: blob 7s infinite;
        }
        .animation-delay-2000 {
            animation-delay: 2s;
        }
        .animation-delay-4000 {
            animation-delay: 4s;
        }
        
        /* Animasi Modal Popup */
        @keyframes bounce-short {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5%); }
        }
        .animate-bounce-short {
            animation: bounce-short 0.5s ease-out 1;
        }
    </style>
</head>
<body class="min-h-screen bg-[#f0f9ff] relative overflow-x-hidden font-sans text-slate-800">

    <!-- Corak Latar Belakang Ceria -->
    <div class="fixed top-0 left-0 w-full h-full overflow-hidden z-0 opacity-20 pointer-events-none">
        <div class="absolute top-10 left-10 w-48 h-48 bg-yellow-300 rounded-full mix-blend-multiply filter blur-2xl animate-blob"></div>
        <div class="absolute top-0 right-20 w-48 h-48 bg-pink-300 rounded-full mix-blend-multiply filter blur-2xl animate-blob animation-delay-2000"></div>
        <div class="absolute -bottom-8 left-40 w-48 h-48 bg-blue-300 rounded-full mix-blend-multiply filter blur-2xl animate-blob animation-delay-4000"></div>
    </div>

    <!-- Konten Utama -->
    <div class="relative z-10 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        
        <!-- Bahagian Tajuk Utama (Header) & Logo Sekolah -->
        <div class="text-center mb-12 flex flex-col items-center">
            
            <!-- Bekas Logo dan Nama Sekolah -->
            <div class="bg-white/80 backdrop-blur-md rounded-3xl p-6 shadow-sm border-2 border-white mb-8 flex flex-col md:flex-row items-center justify-center gap-6 max-w-4xl w-full">
                <img 
                    src="logo.png" 
                    alt="Logo SK Pendidikan Khas Miri" 
                    class="w-24 h-24 md:w-32 md:h-32 object-contain drop-shadow-md"
                    onerror="this.onerror=null; this.src='https://via.placeholder.com/150?text=Logo+SKPK';"
                >
                <div class="text-center md:text-left">
                    <h2 class="text-xl md:text-2xl font-bold text-slate-700 tracking-wide">
                        SEKOLAH KEBANGSAAN PENDIDIKAN KHAS MIRI
                    </h2>
                    <p class="text-slate-500 font-medium text-sm md:text-base mt-1">
                        Bersatu Berdikari
                    </p>
                </div>
            </div>

            <h1 class="text-4xl md:text-5xl lg:text-6xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-purple-600 via-pink-500 to-orange-500 drop-shadow-sm mb-4">
                🌟 Hab Pembelajaran Hebat! 🌟
            </h1>
            <p class="text-lg md:text-xl text-slate-600 font-medium max-w-2xl mx-auto bg-white/50 backdrop-blur-sm rounded-full py-2 px-6 shadow-sm border border-white">
                Pilih permainan dan aplikasi di bawah untuk mula belajar sambil leka!
            </p>
        </div>

        <!-- Grid Butang Aplikasi (Akan diisi oleh JavaScript) -->
        <div id="app-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 md:gap-6">
            <!-- Butang akan dijana di sini -->
        </div>
    </div>

    <!-- Modal Popup (Akan Datang) -->
    <div id="modal" class="fixed inset-0 z-50 items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm hidden">
        <div class="bg-white rounded-[2rem] p-8 max-w-sm w-full text-center shadow-2xl relative border-4 border-pink-400 transform animate-bounce-short">
            <button 
                onclick="closeModal()"
                class="absolute top-4 right-4 text-slate-400 hover:text-slate-600 hover:bg-slate-100 rounded-full p-1 transition-colors"
            >
                <i data-lucide="x" class="w-6 h-6"></i>
            </button>
            
            <div class="text-6xl mb-4">🚧</div>
            <h3 class="text-2xl font-bold text-slate-800 mb-2">Harap Maklum!</h3>
            <p class="text-slate-600 mb-6">
                Aplikasi <strong id="modal-title-text" class="text-pink-500"></strong> sedang dalam pembinaan oleh cikgu. Nanti kita main sama-sama ya!
            </p>
            <button 
                onclick="closeModal()"
                class="w-full py-3 px-6 bg-gradient-to-r from-pink-500 to-purple-500 hover:from-pink-600 hover:to-purple-600 text-white font-bold rounded-2xl shadow-lg transition-transform active:scale-95"
            >
                Baik Cikgu!
            </button>
        </div>
    </div>

    <script>
        // Data Aplikasi
        const appList = [
            { title: "Tambah 1 hingga 10", path: "aplikasi_tambah_1_10.html", color: "bg-red-400", icon: "calculator" },
            { title: "Pengurusan Diri", path: "/pengurusan diri/pengurusandiri.html", color: "bg-orange-400", icon: "smile" },
            { title: "Number Vee", path: "/Number - Vee/number.html", color: "bg-amber-400", icon: "binary" },
            { title: "Nilai Murni", path: "/NILAI MURNI/nilai murni.html", color: "bg-green-400", icon: "heart-handshake" },
            { title: "Negeri di Malaysia", path: "/Negeri-negeri di Malaysia/negeri di malaysia.html", color: "bg-emerald-400", icon: "map" },
            { title: "Kuiz Haiwan", path: "/KUIZ HAIWAN- ZEP/kuiz haiwan.html", color: "bg-teal-400", icon: "cat" },
            { title: "Kenal Nombor", path: "/KENAL NOMBOR-JER/kenal nombor.html", color: "bg-cyan-400", icon: "trophy" },
            { title: "Belajar Jawi", path: "/JAWI/jawi.html", color: "bg-blue-400", icon: "pen-tool" },
            { title: "Kira Itik", path: "/itik/lawan kira itik.html", color: "bg-indigo-400", icon: "bird" },
            { title: "English Year 1", path: "/ENGLISH YEAR 1 GAME-Mary/englis Y1 games.html", color: "bg-violet-400", icon: "languages" },
            { title: "Game Boboiboy", path: "/Boboiboy v7/boboiboy.html", color: "bg-purple-400", icon: "gamepad-2" },
            { title: "Benda Hidup & Bukan", path: "/benda hidup dan benda bukan hidup - ruyun/pokemon.html", color: "bg-fuchsia-400", icon: "leaf" },
            { title: "KAIKuP", path: "/KAIKuP/kaikup.html", color: "bg-pink-400", icon: "brain-circuit" },
            { title: "BM Pemulihan", path: "/PEMULIHAN - amal/BM PEMULIHAN/bmpemulihan.html", color: "bg-rose-400", icon: "book-open" },
            { title: "Matematik Pemulihan", path: "/PEMULIHAN - amal/MATE PEMULIHAN/math.html", color: "bg-red-500", icon: "calculator" },
            { title: "Kuiz Nombor 1-10", path: "kuiz_nombor_1_hingga_10.html", color: "bg-yellow-500", icon: "list-ordered" },
            
            // Aplikasi yang belum ada HTML (guna null untuk path)
            { title: "Capitalization (Sya)", path: null, color: "bg-slate-400", icon: "wand-2" },
            { title: "Punching Verbs", path: null, color: "bg-slate-500", icon: "gamepad-2" }
        ];

        // Fungsi untuk mengendalikan klik aplikasi
        function handleAppClick(path, title) {
            if (path) {
                window.open(path, '_blank');
            } else {
                document.getElementById('modal-title-text').innerText = title;
                const modal = document.getElementById('modal');
                modal.classList.remove('hidden');
                modal.classList.add('flex');
            }
        }

        // Fungsi untuk menutup modal
        function closeModal() {
            const modal = document.getElementById('modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        // Menjana butang secara dinamik
        const appGrid = document.getElementById('app-grid');
        
        appList.forEach(app => {
            // Buat elemen butang
            const button = document.createElement('button');
            button.className = `${app.color} group relative flex flex-col items-center justify-center p-6 rounded-3xl text-white shadow-[0_8px_0_0_rgba(0,0,0,0.15)] hover:shadow-[0_4px_0_0_rgba(0,0,0,0.15)] hover:-translate-y-1 transition-all duration-200 ease-in-out border-4 border-white/20`;
            button.onclick = () => handleAppClick(app.path, app.title);

            // Kandungan dalam butang
            let buttonContent = `
                <div class="absolute inset-0 bg-white/20 rounded-3xl opacity-0 group-hover:opacity-100 transition-opacity duration-200"></div>
                <i data-lucide="${app.icon}" stroke-width="2.5" class="w-12 h-12 mb-3 drop-shadow-md transform group-hover:scale-110 group-hover:rotate-3 transition-transform duration-200"></i>
                <span class="font-bold text-center leading-tight drop-shadow-md text-sm md:text-base">${app.title}</span>
            `;

            // Tambah lencana (badge) "SOON" jika tiada path (belum siap)
            if (!app.path) {
                buttonContent += `
                    <span class="absolute -top-3 -right-3 bg-yellow-400 text-yellow-900 text-xs font-black px-3 py-1 rounded-full border-2 border-white shadow-md rotate-12">
                        SOON
                    </span>
                `;
            }

            button.innerHTML = buttonContent;
            appGrid.appendChild(button);
        });

        // Initialize Lucide Icons selepas elemen di dalam DOM dah siap dicipta
        lucide.createIcons();

    </script>
</body>
</html>
