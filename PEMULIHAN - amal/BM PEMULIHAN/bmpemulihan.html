                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];

        const formatKVK = (text) => {
            const vowels = ['a', 'e', 'i', 'o', 'u', 'A', 'E', 'I', 'O', 'U'];
            return text.split('').map(char => {
                if (vowels.includes(char)) {
                    return `<span class="text-rose-500 font-extrabold">${char}</span>`;
                } else if (/[a-zA-Z]/.test(char)) {
                    return `<span class="text-blue-600 font-extrabold">${char}</span>`;

                    return `<span class="text-gray-400 font-black">${char}</span>`;

            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        };

        // Menandakan gambar terpilih (A atau B) untuk Tajuk 8
        window.selectImageSuaikan = (playerIndex, imgKey) => {
            const player = players[playerIndex];
            if (player.feedback || player.isFinished) return;

            // Jika gambar sudah dipadankan, abaikan klik
            if (player.matches[imgKey]) return;

            player.selectedImg = imgKey;
            updatePlayerColumn(playerIndex);
            
            // Cuba padankan jika perkataan juga sudah dipilih
            checkAndMatchSuaikan(playerIndex);
        };

        // Menandakan perkataan terpilih untuk Tajuk 8
        window.selectWordSuaikan = (playerIndex, word) => {
            const player = players[playerIndex];
            if (player.feedback || player.isFinished) return;

            // Jika perkataan ini sudah dipadankan pada mana-mana gambar, abaikan klik
            if (Object.values(player.matches).includes(word)) return;

            player.selectedWord = word;
            updatePlayerColumn(playerIndex);

            // Cuba padankan jika gambar juga sudah dipilih
            checkAndMatchSuaikan(playerIndex);
        };

        // Menggabungkan pilihan gambar dan perkataan yang sesuai
        const checkAndMatchSuaikan = (playerIndex) => {
            const player = players[playerIndex];
            if (player.selectedImg && player.selectedWord) {
                player.matches[player.selectedImg] = player.selectedWord;
                
                // Set Semula State Pilihan Sementara
                player.selectedImg = null;
                player.selectedWord = null;
                updatePlayerColumn(playerIndex);

                // Jika kedua-dua gambar sudah berjaya dipadankan, semak keputusan
                if (player.matches["A"] && player.matches["B"]) {
                    semakKeputusanSuaikan(playerIndex);
                }
            }
        };

        // Semak adakah padanan yang dilakukan murid betul
        const semakKeputusanSuaikan = (playerIndex) => {
            const player = players[playerIndex];
            const currentQ = player.playerQuestions[player.currentQuestion];

            // Semak jawapan
            const isCorrectA = player.matches["A"] === currentQ.itemA.text;
            const isCorrectB = player.matches["B"] === currentQ.itemB.text;
            const isAllCorrect = isCorrectA && isCorrectB;

            playSound(isAllCorrect ? 'correct' : 'wrong');

            // Hantar feedback visual
            player.feedback = { isCorrect: isAllCorrect };
            if (isAllCorrect) {
                player.score += 1;
            }

            checkAllFinished();
            updatePlayerColumn(playerIndex);
        };

            player.matches = {};
            player.selectedImg = null;
            player.selectedWord = null;
            updatePlayerColumn(playerIndex);

            const player = players[playerIndex];
            if (player.feedback || player.isFinished) return;

            const currentQ = player.playerQuestions[player.currentQuestion];
            const isCorrect = option === currentQ.answer;

            playSound(isCorrect ? 'correct' : 'wrong');

            if (isCorrect) {
                player.score += 1;
            }

            checkAllFinished();
            updatePlayerColumn(playerIndex);
        };

        window.handleNextQuestion = (playerIndex) => {
            const player = players[playerIndex];
            player.currentQuestion += 1;
            player.feedback = null;
            player.matches = {}; // Reset state padanan untuk soalan seterusnya
            player.selectedImg = null;
            player.selectedWord = null;
            
            if (player.currentQuestion >= player.playerQuestions.length) {

            checkAllFinished();

            // Membina struktur jadual HTML untuk memastikan Excel membaca format bahasa & warna dengan betul
            let htmlTable = `
                <html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40">
                <head>
                    <meta charset="utf-8">

                    <p>Tarikh Muat Turun: ${new Date().toLocaleDateString('ms-MY')} | Masa: ${new Date().toLocaleTimeString('ms-MY')}</p>

                        </thead>

            `;

                htmlTable += `

                    </tr>
                `;
            });

            htmlTable += `
                        </tbody>
                    </table>
                </body>
                </html>
            `;

            // Proses pemuatan turun fail Excel
            const blob = new Blob([htmlTable], { type: 'application/vnd.ms-excel;charset=utf-8;' });

                // Imej pintas berserta sistem sandaran (Kecuali untuk abjad, tidak diletakkan mediaHtml)
                let mediaHtml = '';
                if (currentQ.type === 'abjad') {
                    mediaHtml = ''; // Tiada sebarang emoji atau gambar untuk soalan abjad
                } else if (currentQ.image) {
                    mediaHtml = `
                        <div class="relative flex justify-center items-center mb-4 min-h-[140px] md:min-h-[180px]">
                            <img src="${currentQ.image}" alt="${currentQ.answer}" 
                                 onerror="this.style.display='none'; document.getElementById('emoji-fallback-${index}').style.display='block';" 
                                 class="h-32 md:h-40 object-contain rounded-2xl mx-auto shadow-md border-2 border-purple-200 bg-white p-2">
                            <div id="emoji-fallback-${index}" style="display: none;" class="text-7xl animate-bounce">
                                ${currentQ.emoji}
                            </div>
                        </div>
                    `;
                } else {
                    mediaHtml = `
                        <div class="text-7xl mb-4 animate-bounce flex justify-center items-center min-h-[140px] md:min-h-[180px]">
                            ${currentQ.emoji}
                        </div>
                    `;
                }

                // Dapatkan teks soalan yang telah diwarnakan
                let displayQuestionText = currentQ.questionText;
                if (currentQ.type === 'abjad') {
                    const targetLetter = currentQ.questionText.slice(-1);
                    const instruction = currentQ.questionText.slice(0, -1);
                    displayQuestionText = instruction + formatKVK(targetLetter);
                } else if (currentQ.type === 'kv-kvk') {
                    displayQuestionText = `<span class="text-blue-600 font-extrabold">${currentQ.kv}</span> + <span class="text-gray-400 font-black">___</span> = <span class="text-blue-600 font-extrabold">${currentQ.kv}</span><span class="text-pink-500 font-extrabold">${currentQ.kvk}</span>`;
                } else if (currentQ.type === 'kvk' || currentQ.type === 'kv-kv' || currentQ.type === 'kv-kv-kv' || currentQ.type === 'v-kvk' || currentQ.type === 'suaikan-gambar') {
                    displayQuestionText = formatKVK(currentQ.questionText);
                }

                html += `
                    <div class="flex flex-col h-full animate-fade-in">
                        <!-- Progress Bar -->
                        <div class="w-full bg-gray-200 rounded-full h-3 mb-4 overflow-hidden">
                          <div class="bg-gradient-to-r from-purple-400 to-indigo-400 h-3 rounded-full transition-all duration-300" style="width: ${progressPct}%"></div>
                        </div>

                        <!-- Gambar / Media -->
                        ${mediaHtml}

                        <!-- Soalan -->
                        <div class="flex flex-col items-center text-center flex-grow">
                            <h3 class="text-3xl lg:text-4xl font-black text-indigo-950 mb-6 lg:mb-8 tracking-wide">
                                ${displayQuestionText}
                            </h3>

                            <!-- Options Grid dengan Gaya Retro Kontra Bujur -->
                            <div class="grid grid-cols-1 gap-4 w-full">
                `;

                currentQ.options.forEach((opt, i) => {
                    let btnClass = "";
                    let iconHtml = "";

                    // Warna asas retro kontra bergilir-gilir mengikut susunan pilihan butang
                    const retroColors = [
                        'bg-[#E9C46A] hover:bg-[#f3d18c] text-slate-900',  // Mustard Yellow
                        'bg-[#E76F51] hover:bg-[#f08066] text-white',      // Terracotta Red
                        'bg-[#2A9D8F] hover:bg-[#3dbbb1] text-white'       // Persian Teal
                    ];

                    let baseColor = retroColors[i % retroColors.length];

                    if (player.feedback) {
                        if (opt === currentQ.answer) {
                            btnClass = "bg-green-100 border-green-600 text-green-800 shadow-[2px_2px_0px_0px_#166534]";
                            iconHtml = `<i class="fa-solid fa-circle-check absolute right-5 top-1/2 -translate-y-1/2 text-3xl text-green-600 animate-bounce"></i>`;
                        } else if (opt === player.feedback.option) {
                            btnClass = "bg-red-100 border-red-600 text-red-800 shadow-[2px_2px_0px_0px_#991b1b]";
                            iconHtml = `<i class="fa-solid fa-circle-xmark absolute right-5 top-1/2 -translate-y-1/2 text-3xl text-red-600"></i>`;
                        } else {
                            btnClass = "opacity-30 border-gray-300 bg-gray-50 text-gray-400 shadow-none";
                        }
                    } else {
                        btnClass = `${baseColor} cursor-pointer`;
                    }
                    
                    let displayOpt = opt;
                    if (currentQ.type === 'suaikan-gambar' && topic8WordMappings[opt]) {
                        const mapData = topic8WordMappings[opt];
                        displayOpt = `<span class="text-blue-600 font-extrabold">${mapData.kv}</span><span class="text-rose-500 font-extrabold">${mapData.kvk}</span>`;
                    } else if (currentQ.type === 'kv-kvk') {
                        displayOpt = `<span class="text-pink-900 font-extrabold">${opt}</span>`;
                    } else if (currentQ.type === 'kvk' || currentQ.type === 'kv-kv' || currentQ.type === 'kv-kv-kv' || currentQ.type === 'abjad' || currentQ.type === 'v-kvk') {
                        displayOpt = formatKVK(opt);
                    }

                    html += `
                        <button ${player.feedback ? 'disabled' : ''} onclick="handleAnswer(${index}, '${opt}')" class="retro-btn py-4 px-2 text-3xl font-black transition-all relative ${btnClass}">
                            ${displayOpt}
                            ${iconHtml}
                        </button>
                    `;
                });

                html += `
                            </div>
                        </div>
                `;

                // Feedback Overlay inside column (Penyimpanan per-soalan ditiadakan untuk penumpuan pusingan penuh)
                if (player.feedback) {
                    const isCorrect = player.feedback.isCorrect;
                    const fbBg = isCorrect ? 'bg-green-100/95' : 'bg-red-100/95';
                    const fbText = isCorrect ? 'text-green-800' : 'text-red-800';
                    const fbMessage = isCorrect ? 'BAGUS!' : 'CUBA LAGI';
                    const btnBg = isCorrect ? 'bg-[#2A9D8F] hover:bg-[#3dbbb1]' : 'bg-[#E76F51] hover:bg-[#f08066]';

                    html += `
                        <div class="mt-4 p-4 rounded-[24px] border-4 border-slate-800 shadow-[4px_4px_0px_0px_rgba(30,41,59,1)] flex flex-col items-center animate-slide-in-up ${fbBg}">
                            <p class="text-3xl font-black uppercase mb-3 ${fbText}">${fbMessage}</p>
                            <button onclick="handleNextQuestion(${index})" class="retro-btn w-full py-3 text-xl font-bold text-white flex justify-center items-center gap-2 ${btnBg}">
                                Teruskan <i class="fa-solid fa-arrow-right animate-pulse"></i>
                            </button>
                        </div>
                    `;
                }

                html += `</div>`; // End active state container
            }
            
            html += `</div>`; // End p-4 flex-grow container
            colElement.innerHTML = html;
        };

        const updateTimerUI = () => {
            const timerContainer = document.getElementById('timer-container');
            const timerDisplay = document.getElementById('timer-display');
            if (!timerDisplay) return;

            timerDisplay.innerText = formatTime(timeLeft);

            if (timeLeft <= 10) {
                timerContainer.className = "flex items-center gap-4 px-8 py-3 rounded-full border-4 shadow-md bg-red-100 border-red-500 text-red-600 animate-pulse";
            }
        };

        // View 4: Results (Menyimpan markah secara rasmi di sini selepas tamat keseluruhan sesi)
        const renderResults = () => {
            resetBodyBackground();
            const sortedPlayers = [...players].sort((a, b) => b.score - a.score);
            
            let podiumHTML = sortedPlayers.map((p, index) => `
                <div class="bg-purple-50 rounded-3xl p-6 border-4 border-slate-800 shadow-[4px_4px_0px_0px_rgba(30,41,59,1)] flex flex-col items-center relative overflow-hidden">
                    ${(index === 0 && playerCount > 1) ? `<div class="absolute top-0 left-0 w-full bg-yellow-400 text-yellow-950 font-black py-1 text-sm uppercase border-b-2 border-slate-800">Pemenang</div>` : ''}
                    <i class="fa-solid fa-user text-6xl mb-2 mt-4 ${index === 0 ? 'text-yellow-500 animate-bounce' : 'text-purple-400'}"></i>
                    <h3 class="text-3xl font-black text-indigo-950 mb-2 truncate w-full">${p.name}</h3>
                    <div class="bg-white px-6 py-3 rounded-full flex items-center justify-center gap-2 w-full border-2 border-gray-200">
                        <i class="fa-solid fa-star text-yellow-400 text-3xl"></i>
                        <span class="text-4xl font-black text-blue-600">${p.score}</span>
                    </div>
                </div>
            `).join('');

            appContainer.innerHTML = `
                <main class="bg-white/90 backdrop-blur-sm rounded-3xl shadow-2xl p-8 md:p-12 w-full max-w-4xl text-center border-4 border-purple-200 animate-zoom-in">
                    <i class="fa-solid fa-trophy text-yellow-400 text-8xl mx-auto mb-6 drop-shadow-lg animate-pulse"></i>
                    <h2 class="text-5xl font-black text-indigo-950 mb-2">
                        ${timeLeft <= 0 ? "MASA TAMAT!" : "KUIZ TAMAT!"}
                    </h2>
                    <p class="text-2xl text-purple-600 font-bold mb-4">Kerja yang sangat bagus semua!</p>
                    <p class="font-inter text-md text-emerald-700 font-bold mb-8">💾 Semua markah murid telah berjaya direkodkan secara automatik ke dalam Diari Mod Guru!</p>
                    
                    <div class="grid gap-6 mb-10 ${getGridClass(playerCount)}">
                        ${podiumHTML}
                    </div>

                    <div class="flex flex-col sm:flex-row gap-4 justify-center">
                        <button onclick="resetGame()" class="retro-btn flex-1 inline-flex items-center justify-center gap-3 bg-[#E76F51] hover:bg-[#F4A261] text-white text-3xl font-extrabold py-5 px-10">
                            <i class="fa-solid fa-rotate-right"></i>
                            Main Semula
                        </button>
                        <button onclick="renderTeacherMode()" class="retro-btn flex-1 inline-flex items-center justify-center gap-3 bg-[#2A9D8F] hover:bg-[#3dbbb1] text-white text-3xl font-extrabold py-5 px-10">
                            <i class="fa-solid fa-chalkboard-user"></i>
                            Mod Guru
                        </button>
                    </div>
                </main>
            `;
        };

        // --- View 5: MOD GURU & LEADERBOARD (Koleksi Rekod Sesi Ditulis dengan Inter & Dikelompok Mengikut Tajuk) ---
        window.renderTeacherMode = () => {
            resetBodyBackground();
            if (timerInterval) clearInterval(timerInterval);

            // 1. Bina Struktur Butang Tab Penapis Lembut (Watercolor Pastel)
            const isAllActive = activeTeacherTab === "semua";
            let tabButtonsHTML = `
                <button onclick="setTeacherTab('semua')" class="px-5 py-2.5 rounded-full font-bold text-sm transition-all border-2 ${isAllActive ? 'bg-[#2A9D8F] text-white border-slate-800 shadow-[2px_2px_0px_0px_#1E293B]' : 'bg-white text-slate-700 border-slate-200 hover:bg-slate-100'}">
                    ⭐ Paparan Pengumpulan (Semua)
                </button>
            `;
            
            for (let tNum = 1; tNum <= 8; tNum++) {
                const isActive = activeTeacherTab === tNum;
                tabButtonsHTML += `
                    <button onclick="setTeacherTab(${tNum})" class="px-4 py-2.5 rounded-full font-bold text-sm transition-all border-2 ${isActive ? 'bg-[#2A9D8F] text-white border-slate-800 shadow-[2px_2px_0px_0px_#1E293B]' : 'bg-white text-slate-700 border-slate-200 hover:bg-slate-100'}">
                        Tajuk ${tNum}
                    </button>
                `;
            }

            // 2. Bina Paparan Mengikut Pemilihan Tab
            let mainContentHTML = "";

            if (isAllActive) {
                // --- PAPARAN KUMPULAN MENGIKUT TAJUK (SUMMARY GRID OF TOP 3 FOR EACH TOPIC) ---
                mainContentHTML += `
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 text-slate-700">
                `;

                for (let tNum = 1; tNum <= 8; tNum++) {
                    const topicName = getTopicName(tNum);
                    // Tapis data mengikut tajuk ini sahaja
                    const topicRecords = teacherRecords.filter(r => r.topic === topicName);
                    // Sort mengikut skor tertinggi
                    const sortedTopicRecords = [...topicRecords].sort((a, b) => b.score - a.score).slice(0, 3);

                    let topicTableRows = sortedTopicRecords.map((r, i) => `
                        <tr class="border-b border-slate-100 text-xs font-semibold">
                            <td class="p-2 text-center font-bold text-indigo-600">${i + 1}</td>
                            <td class="p-2 font-bold truncate max-w-[120px]">${r.playerName}</td>
                            <td class="p-2 text-center">
                                <span class="bg-indigo-50 text-indigo-900 py-0.5 px-2 rounded-full font-black text-xs">
                                    ${r.score}/${r.total}
                                </span>
                            </td>
                            <td class="p-2 text-center text-[10px] text-slate-400 font-medium">${r.date}</td>
                        </tr>
                    `).join('');

                    if (sortedTopicRecords.length === 0) {
                        topicTableRows = `
                            <tr>
                                <td colspan="4" class="p-4 text-center text-xs text-slate-400 font-medium">
                                    Tiada rekod disimpan untuk tajuk ini.
                                </td>
                            </tr>
                        `;
                    }

                    mainContentHTML += `
                        <div class="bg-white border-2 border-slate-200 rounded-2xl p-4 shadow-sm hover:shadow-md transition-all">
                            <div class="flex justify-between items-center border-b border-slate-150 pb-2 mb-3">
                                <h4 class="text-sm font-extrabold text-slate-900 truncate max-w-[80%]">${topicName}</h4>
                                <span class="bg-teal-50 text-teal-800 text-[10px] font-bold px-2 py-0.5 rounded-full border border-teal-150">
                                    Sesi: ${topicRecords.length}
                                </span>
                            </div>
                            <table class="w-full text-left border-collapse">
                                <thead>
                                    <tr class="bg-slate-50 text-[10px] font-bold text-slate-500 border-b border-slate-200">
                                        <th class="p-2 text-center">Ked</th>
                                        <th class="p-2">Nama</th>
                                        <th class="p-2 text-center">Skor</th>
                                        <th class="p-2 text-center">Tarikh</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${topicTableRows}
                                </tbody>
                            </table>
                        </div>
                    `;
                }

                mainContentHTML += `</div>`; // End Grid

            } else {
                // --- DETAILED LEADERBOARD TABLE FOR SELECTED SINGLE TOPIC ---
                const selectedTopicName = getTopicName(activeTeacherTab);
                const filteredRecords = teacherRecords.filter(r => r.topic === selectedTopicName);
                const sortedRecords = [...filteredRecords].sort((a, b) => b.score - a.score);

                let leaderboardHTML = sortedRecords.map((r, i) => `
                    <tr class="border-b border-slate-200 text-base font-semibold ${i === 0 ? 'bg-yellow-50/50 text-yellow-900' : 'text-slate-800'}">
                        <td class="p-3 text-center font-bold">${i + 1} 🏆</td>
                        <td class="p-3 font-bold">${r.playerName}</td>
                        <td class="p-3 text-indigo-750 font-medium">${r.topic}</td>
                        <td class="p-3 text-center">
                            <span class="bg-indigo-100 text-indigo-900 py-1 px-3 rounded-full text-sm font-bold">
                                ${r.score} / ${r.total}
                            </span>
                        </td>
                        <td class="p-3 text-center text-sm text-slate-500 font-medium">${r.date} &nbsp;<span class="text-xs text-slate-400">${r.time}</span></td>
                    </tr>
                `).join('');

                if (sortedRecords.length === 0) {
                    leaderboardHTML = `
                        <tr>
                            <td colspan="5" class="p-8 text-center text-lg text-slate-400 font-bold">
                                📭 Tiada rekod markah murid untuk tajuk ini lagi.
                            </td>
                        </tr>
                    `;
                }

                mainContentHTML += `
                    <div class="bg-white border-2 border-slate-300 rounded-2xl shadow-md overflow-hidden overflow-x-auto text-slate-700">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-slate-50 border-b-2 border-slate-200 text-sm font-bold text-slate-600">
                                    <th class="p-3 text-center">Ked</th>
                                    <th class="p-3">Nama Pemain</th>
                                    <th class="p-3">Tajuk Permainan</th>
                                    <th class="p-3 text-center">Skor Akhir</th>
                                    <th class="p-3 text-center">Tarikh & Masa</th>
                                </tr>
                            </thead>
                            <tbody class="text-sm">
                                ${leaderboardHTML}
                            </tbody>
                        </table>
                    </div>
                `;
            }

            // Semua Sejarah Sesi Log Kecil (Ditempatkan di bahagian bawah)
            let allLogsHTML = teacherRecords.map((r) => `
                <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 text-xs font-semibold shadow-sm">
                    <div>
                        <span class="text-[10px] text-slate-400 block mb-1 font-medium">${r.date} &nbsp; ${r.time}</span>
                        <span class="text-base font-bold text-slate-900">${r.playerName}</span>
                        <span class="text-xs text-indigo-600 block mt-0.5">${r.topic}</span>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="bg-[#2A9D8F] text-white text-xs font-bold py-1 px-3 rounded-full border border-slate-700 shadow-sm">
                            Skor Akhir: ${r.score} / ${r.total}
                        </span>
                    </div>
                </div>
            `).join('');

            if (teacherRecords.length === 0) {
                allLogsHTML = `
                    <div class="text-center py-6 text-slate-400 font-bold text-sm">
                        Tiada log sesi disimpan.
                    </div>
                `;
            }

            appContainer.innerHTML = `
                <!-- Seluruh Container Menggunakan Font Inter bagi Kekemasan Maksimum -->
                <main class="font-inter bg-white/95 backdrop-blur-sm rounded-[32px] shadow-2xl p-6 md:p-10 w-full max-w-5xl border-4 border-indigo-200/50 animate-zoom-in">
                    <!-- Header Mod Guru -->
                    <div class="flex flex-col md:flex-row justify-between items-center gap-4 border-b-2 border-slate-200 pb-6 mb-6">
                        <div class="text-center md:text-left">
                            <span class="bg-teal-100 text-teal-800 border border-teal-200 font-bold py-1 px-4 rounded-full text-xs">
                                <i class="fa-solid fa-circle-check"></i> DIARI PEMULIHAN KHAS
                            </span>
                            <h2 class="text-2xl md:text-3xl font-extrabold text-slate-900 mt-1">Papan Pemantauan Guru</h2>
                            <p class="text-sm text-slate-500 font-semibold">SK PENDIDIKAN KHAS MIRI, SARAWAK</p>
                        </div>
                        
                        <div class="flex flex-wrap gap-3">
                            <!-- Butang Simpan ke Excel -->
                            <button onclick="muatTurunExcel()" class="retro-btn bg-[#2A9D8F] hover:bg-[#3dbbb1] text-white font-bold py-3 px-6 text-base flex items-center gap-2">
                                <i class="fa-solid fa-file-excel text-xl"></i> Simpan Excel (.xls)
                            </button>
                            <button onclick="padamSemuaRekod()" class="retro-btn bg-[#E76F51] hover:bg-[#f08066] text-white font-bold py-3 px-6 text-base flex items-center gap-2">
                                <i class="fa-solid fa-trash-can"></i> Padam Log
                            </button>
                        </div>
                    </div>

                    <!-- Butang Tab Penapis Lembut (Watercolor Pastel) -->
                    <div class="mb-6">
                        <p class="text-sm font-bold text-slate-500 mb-3"><i class="fa-solid fa-filter"></i> Tapis Mengikut Tajuk Soalan:</p>
                        <div class="flex flex-wrap gap-2 justify-start">
                            ${tabButtonsHTML}
                        </div>
                    </div>

                    <!-- Kandungan Utama (Koleksi Kelompok atau Jadual Tajuk Tunggal) -->
                    <div class="mb-10">
                        ${mainContentHTML}
                    </div>

                    <!-- Sejarah Log Sesi Lengkap Semua Murid -->
                    <div class="border-t-2 border-slate-200 pt-6">
                        <h3 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">
                            <i class="fa-solid fa-history text-slate-500"></i> Sejarah Sesi Log Lengkap Murid (Semua Rekod)
                        </h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 max-h-[250px] overflow-y-auto pr-1">
                            ${allLogsHTML}
                        </div>
                    </div>

                    <!-- Footer Mod Guru -->
                    <div class="border-t-2 border-slate-150 pt-6 mt-8 flex flex-col sm:flex-row justify-between items-center gap-4">
                        <button onclick="renderMainMenu()" class="retro-btn bg-[#E9C46A] hover:bg-[#f3d18c] text-slate-900 font-bold py-3 px-8 text-lg flex items-center gap-2">
                            <i class="fa-solid fa-chevron-left"></i> Kembali ke Menu Utama
                        </button>
                        <p class="text-xs font-semibold text-slate-400">© 2026 SK Pendidikan Khas Miri | Sistem Diari Interaktif</p>
                    </div>
                </main>
            `;
        };

        // --- 6. Initialize App ---
        renderWelcomeScreen();

    </script>
</body>
</html>
