<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Permainan Nilai Murni</title>
    <!-- Tailwind CSS untuk gaya (styling) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons untuk ikon visual -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Gaya tambahan minimum jika perlu */
        .hidden-screen { display: none !important; }
    </style>
</head>
<body class="min-h-screen bg-blue-50 flex items-center justify-center p-4 font-sans text-gray-800">

    <div class="max-w-2xl w-full bg-white rounded-3xl shadow-xl overflow-hidden border-4 border-blue-200 relative">
        
        <!-- ================= START SCREEN ================= -->
        <div id="start-screen" class="p-8 md:p-12 text-center flex flex-col items-center block">
            <div class="text-6xl mb-6">🏡❤️👫</div>
            <h1 class="text-3xl md:text-4xl font-bold text-blue-700 mb-4">
                Mari Belajar Nilai Murni!
            </h1>
            <p class="text-lg md:text-xl text-gray-600 mb-8 max-w-md">
                Pilih tindakan yang betul dalam kehidupan bermasyarakat.
            </p>
            <button onclick="startGame()" class="group flex items-center gap-3 bg-green-500 hover:bg-green-600 text-white text-2xl font-bold py-4 px-8 rounded-full transition-all transform hover:scale-105 shadow-lg">
                <i data-lucide="play" class="w-8 h-8 fill-current"></i>
                MULA MAIN
            </button>
        </div>

        <!-- ================= PLAYING SCREEN ================= -->
        <div id="playing-screen" class="hidden-screen flex-col h-full w-full">
            <!-- Header / Progress -->
            <div class="bg-blue-600 text-white p-4 flex justify-between items-center">
                <span id="progress-text" class="text-xl font-bold bg-blue-700 py-1 px-4 rounded-full">
                    Soalan 1 / 5
                </span>
                <span class="text-lg flex items-center gap-2">
                    <i data-lucide="star" class="w-5 h-5 text-yellow-300 fill-current"></i> 
                    Bintang: <span id="score-text">0</span>
                </span>
            </div>

            <div class="p-6 md:p-10 flex-grow flex flex-col items-center">
                <!-- Visual Hint -->
                <div id="question-visual" class="text-7xl mb-6 bg-blue-100 p-6 rounded-full border-4 border-blue-200 shadow-inner">
                    📦 💦
                </div>

                <!-- Question Text -->
                <h2 id="question-text" class="text-2xl md:text-3xl font-bold text-center mb-8 text-gray-800 leading-tight">
                    Soalan di sini
                </h2>

                <!-- Options -->
                <div id="options-container" class="w-full flex flex-col gap-4">
                    <!-- Butang akan dijana oleh JavaScript -->
                </div>

                <!-- Feedback Area -->
                <div id="feedback-container" class="mt-8 min-h-[120px] w-full flex flex-col items-center justify-center">
                    <!-- Maklum balas akan muncul di sini -->
                </div>
            </div>
        </div>

        <!-- ================= FINISHED SCREEN ================= -->
        <div id="finished-screen" class="hidden-screen p-8 md:p-12 text-center flex-col items-center w-full">
            <div class="text-7xl mb-6">🏆🎉</div>
            <h2 class="text-4xl font-bold text-blue-700 mb-4">Permainan Tamat!</h2>
            <p class="text-2xl text-gray-700 mb-2">Anda telah berjaya menjawab semua soalan.</p>
            
            <div class="my-8 bg-yellow-100 border-4 border-yellow-400 p-6 rounded-2xl inline-block">
                <p class="text-3xl font-bold text-yellow-700 flex items-center gap-3 justify-center">
                    <i data-lucide="star" class="w-10 h-10 fill-current"></i> 
                    Bintang Terkumpul: <span id="final-score">0</span>
                </p>
            </div>

            <p class="text-xl text-gray-600 mb-8 max-w-md font-medium mx-auto">
                Syabas! Anda adalah jiran yang sangat baik dan berbudi bahasa.
            </p>

            <button onclick="startGame()" class="flex items-center gap-2 bg-blue-500 hover:bg-blue-600 text-white text-xl font-bold py-3 px-8 rounded-full transition-all hover:shadow-lg mx-auto">
                <i data-lucide="rotate-ccw" class="w-6 h-6"></i>
                Main Semula
            </button>
        </div>

    </div>

    <!-- LOGIK JAVASCRIPT -->
    <script>
        // Data Soalan
        const questions = [
            {
                id: 1,
                text: "Jiran anda sedang angkat kotak yang berat. Apa yang patut anda buat?",
                visual: "📦 💦",
                nilai: "Bekerjasama",
                options: [
                    { text: "Tolong jiran angkat kotak.", isCorrect: true, emoji: "🤝" },
                    { text: "Tengok sahaja.", isCorrect: false, emoji: "👀" }
                ]
            },
            {
                id: 2,
                text: "Kawan jiran anda sedang sakit di rumah. Apa yang patut anda buat?",
                visual: "🤒 🛏️",
                nilai: "Prihatin",
                options: [
                    { text: "Pasang muzik dengan kuat.", isCorrect: false, emoji: "🔊" },
                    { text: "Ziarah dan bawa buah tangan.", isCorrect: true, emoji: "🍎" }
                ]
            },
            {
                id: 3,
                text: "Anda nampak banyak sampah di taman permainan. Apa yang patut anda buat?",
                visual: "🗑️ 🌳",
                nilai: "Bertanggungjawab",
                options: [
                    { text: "Kutip dan buang dalam tong sampah.", isCorrect: true, emoji: "✅" },
                    { text: "Biar sahaja sampah di situ.", isCorrect: false, emoji: "🚶" }
                ]
            },
            {
                id: 4,
                text: "Jiran berlainan kaum beri makanan kepada anda.",
                visual: "🍛 😊",
                nilai: "Berterima Kasih",
                options: [
                    { text: "Tolak dan tutup pintu.", isCorrect: false, emoji: "🚪" },
                    { text: "Terima dan cakap 'Terima Kasih'.", isCorrect: true, emoji: "🙏" }
                ]
            },
            {
                id: 5,
                text: "Sudah malam. Jiran anda sedang tidur. Anda mahu tengok televisyen.",
                visual: "📺 🌙",
                nilai: "Menghormati",
                options: [
                    { text: "Buka televisyen perlahan sahaja.", isCorrect: true, emoji: "🔉" },
                    { text: "Buka televisyen kuat-kuat.", isCorrect: false, emoji: "📢" }
                ]
            }
        ];

        // Pembolehubah (Variables) State
        let currentQuestionIndex = 0;
        let score = 0;
        let isAnsweredCorrectly = false;

        // Elemen-elemen DOM
        const startScreen = document.getElementById('start-screen');
        const playingScreen = document.getElementById('playing-screen');
        const finishedScreen = document.getElementById('finished-screen');
        
        const progressText = document.getElementById('progress-text');
        const scoreText = document.getElementById('score-text');
        const questionVisual = document.getElementById('question-visual');
        const questionText = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const feedbackContainer = document.getElementById('feedback-container');
        const finalScore = document.getElementById('final-score');

        // Fungsi Mulakan Permainan
        function startGame() {
            startScreen.classList.add('hidden-screen');
            startScreen.classList.remove('flex');
            
            finishedScreen.classList.add('hidden-screen');
            finishedScreen.classList.remove('flex');

            playingScreen.classList.remove('hidden-screen');
            playingScreen.classList.add('flex');

            currentQuestionIndex = 0;
            score = 0;
            updateScoreUI();
            loadQuestion();
        }

        // Fungsi Muatkan Soalan
        function loadQuestion() {
            isAnsweredCorrectly = false;
            feedbackContainer.innerHTML = ''; // Kosongkan feedback
            
            const q = questions[currentQuestionIndex];
            
            progressText.innerText = `Soalan ${currentQuestionIndex + 1} / ${questions.length}`;
            questionVisual.innerText = q.visual;
            questionText.innerText = q.text;

            optionsContainer.innerHTML = ''; // Kosongkan pilihan lama

            q.options.forEach((option, index) => {
                const btn = document.createElement('button');
                // Gaya butang asal
                btn.className = `w-full flex items-center gap-4 p-4 md:p-6 rounded-2xl border-4 text-left transition-all text-xl font-bold bg-white border-blue-300 hover:border-blue-500 hover:bg-blue-50 hover:shadow-md`;
                
                btn.innerHTML = `
                    <span class="text-4xl">${option.emoji}</span>
                    <span class="flex-1">${option.text}</span>
                `;

                btn.onclick = () => handleOptionClick(option.isCorrect, btn, q.nilai);
                optionsContainer.appendChild(btn);
            });
        }

        // Fungsi Pengendali Klik Jawapan
        function handleOptionClick(isCorrect, btnElement, nilai) {
            if (isAnsweredCorrectly) return; // Halang klik selepas dapat jawapan betul

            const allButtons = optionsContainer.querySelectorAll('button');

            if (isCorrect) {
                isAnsweredCorrectly = true;
                score += 1;
                updateScoreUI();

                // Kemaskini gaya butang-butang
                allButtons.forEach(b => {
                    if (b === btnElement) {
                        b.className = 'w-full flex items-center gap-4 p-4 md:p-6 rounded-2xl border-4 text-left transition-all text-xl font-bold bg-green-100 border-green-500 text-green-800 transform scale-105 shadow-lg';
                    } else {
                        b.className = 'w-full flex items-center gap-4 p-4 md:p-6 rounded-2xl border-4 text-left transition-all text-xl font-bold bg-gray-100 border-gray-300 text-gray-400 opacity-50';
                    }
                });

                // Papar maklum balas BETUL
                feedbackContainer.innerHTML = `
                    <div class="w-full bg-green-100 border-l-8 border-green-500 p-4 rounded-r-2xl flex flex-col sm:flex-row items-center justify-between animate-bounce">
                        <div class="flex items-center gap-3">
                            <i data-lucide="check-circle" class="w-10 h-10 text-green-600"></i>
                            <div>
                                <p class="text-2xl font-bold text-green-700">Tahniah! Sangat Bagus! 🌟</p>
                                <p class="text-green-600 font-medium">Nilai: ${nilai}</p>
                            </div>
                        </div>
                        <button onclick="nextQuestion()" class="mt-4 sm:mt-0 flex items-center gap-2 bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-6 rounded-full shadow-md transition-colors text-lg">
                            Seterusnya <i data-lucide="arrow-right" class="w-5 h-5"></i>
                        </button>
                    </div>
                `;
            } else {
                // Papar maklum balas SALAH (cuba lagi)
                feedbackContainer.innerHTML = `
                    <div class="w-full bg-orange-100 border-l-8 border-orange-500 p-4 rounded-r-2xl flex items-center gap-3 animate-pulse">
                        <i data-lucide="x-circle" class="w-10 h-10 text-orange-600"></i>
                        <div>
                            <p class="text-2xl font-bold text-orange-700">Belum tepat.</p>
                            <p class="text-orange-600 font-medium text-lg">Jangan putus asa, sila cuba lagi! 💪</p>
                        </div>
                    </div>
                `;
            }

            // Render semula ikon Lucide yang baru dimasukkan ke dalam DOM
            lucide.createIcons();
        }

        // Fungsi Ke Soalan Seterusnya
        function nextQuestion() {
            if (currentQuestionIndex < questions.length - 1) {
                currentQuestionIndex++;
                loadQuestion();
            } else {
                endGame();
            }
        }

        // Fungsi Tamatkan Permainan
        function endGame() {
            playingScreen.classList.add('hidden-screen');
            playingScreen.classList.remove('flex');
            
            finishedScreen.classList.remove('hidden-screen');
            finishedScreen.classList.add('flex');
            
            finalScore.innerText = score;
        }

        // Fungsi Kemaskini Skor UI
        function updateScoreUI() {
            scoreText.innerText = score;
        }

        // Mulakan ikon Lucide buat kali pertama apabila halaman dimuat
        lucide.createIcons();

    </script>
</body>
</html>
